<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>心灵驿站 · 疗愈与成长</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f3eb;--card:#fefcf7;--hbg:#f0eadb;
  --green:#849974;--dgreen:#5d6b4e;--lgreen:#e8efe2;
  --brown:#9b8b74;--dbrown:#4d3f2f;--text:#4a3f34;
  --tlight:#978f84;--tmuted:#b8b0a6;
  --accent:#d4b87a;--blue:#8ba4b0;--heart:#cc9e8a;
  --border:#e0dbcf;--bdl:#ede8dc;
  --radius:16px;--shadow:0 2px 16px rgba(77,63,47,.06);
  --font:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  --nav-h:64px;--safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-size:15px}
body.size-s{font-size:13px} body.size-l{font-size:17px}
body.font-serif{--font:"Noto Serif SC","Source Han Serif SC","SimSun","STSong",serif}
body{
  font-family:var(--font);color:var(--text);
  -webkit-tap-highlight-color:transparent;overscroll-behavior:none;
  touch-action:manipulation;
  min-height:100dvh;font-size:15px;line-height:1.6;
  background: linear-gradient(175deg, #f9f5ed 0%, #f3efe3 40%, #f7f3eb 100%);
  background-attachment: fixed;
  scroll-behavior:smooth;
}


/* floating decorations */
@keyframes floatA{0%,100%{transform:translateY(0)}33%{transform:translateY(-14px)}66%{transform:translateY(-5px)}}
@keyframes floatB{0%,100%{transform:translateY(0)}33%{transform:translateY(-16px)}66%{transform:translateY(-6px)}}
@keyframes floatC{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.deco-f{position:fixed;pointer-events:none;z-index:-1;opacity:.08;font-size:36px;user-select:none}
.deco-f.d1{top:6%;left:3%;animation:floatA 7s ease-in-out infinite;font-size:44px}
.deco-f.d2{top:16%;right:5%;animation:floatB 8s ease-in-out infinite;font-size:32px}
.deco-f.d3{bottom:22%;left:4%;animation:floatC 6.5s ease-in-out infinite;font-size:36px}
.deco-f.d4{bottom:14%;right:3%;animation:floatA 7.5s ease-in-out infinite;font-size:30px}
.deco-f.d5{top:50%;left:2%;animation:floatB 9s ease-in-out infinite;font-size:26px}
@media (prefers-reduced-motion:reduce){
  .deco-f{animation:none;opacity:.04}
  .page{animation:none}
  .chat-bubble{animation:none}
  .breath-circle{transition:none}
}

/* app container */
.app{max-width:520px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;padding-bottom:calc(var(--nav-h) + var(--safe-b) + 8px)}

/* header */
.header{
  text-align:center;padding:20px 16px 14px;
  background:linear-gradient(180deg,#f4efe0 0%,#efe9d8 60%,#eae3cf 100%);
  border-bottom:2px solid var(--green);
  position:relative;
}
.header h1{font-size:20px;font-weight:700;color:var(--dbrown);letter-spacing:3px;text-shadow:0 1px 0 rgba(255,255,255,.6);font-family:'Lora',var(--font)}
.header .sub{font-size:11px;color:var(--tlight);margin-top:2px;letter-spacing:2px}
.header::after{
  content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.5;
}

/* bottom nav */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:520px;z-index:100;
  display:flex;background:rgba(254,252,247,.96);
  border-top:1px solid var(--bdl);
  padding:6px 0 calc(6px + var(--safe-b));
  box-shadow:0 -2px 20px rgba(77,63,47,.06);
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;padding:4px 0;cursor:pointer;border:none;background:none;
  font-family:var(--font);font-size:10px;color:var(--tmuted);
  transition:color .2s;-webkit-tap-highlight-color:transparent;
}
.nav-item .ni{font-size:20px;line-height:1;transition:transform .2s}
.nav-item.active{color:var(--dgreen);font-weight:600}
.nav-item.active .ni{transform:scale(1.1)}
.nav-item:active .ni{transform:scale(.9)}

/* pages */
.page{display:none;flex:1;padding:12px 14px;animation:fadeIn .2s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* cards */
.card{
  background:var(--card);border-radius:var(--radius);padding:16px;
  box-shadow:0 1px 2px rgba(77,63,47,.02),0 2px 12px rgba(77,63,47,.04);
  margin-bottom:10px;border:1px solid var(--bdl);
  position:relative;overflow:hidden;
  transition:box-shadow .25s ease;
}
.card:focus-within{box-shadow:0 1px 3px rgba(77,63,47,.03),0 6px 24px rgba(132,151,116,.1)}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--green),var(--accent),var(--green),transparent);
  opacity:.25;border-radius:1px 1px 0 0;
}
.card>.card-t{font-size:15px;font-weight:700;color:var(--dgreen);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.card>.card-t::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--bdl),transparent)}

/* sub-nav */
.sub-nav{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.sub-nav button{
  padding:9px 16px;border-radius:20px;font-size:13px;border:none;cursor:pointer;
  background:var(--bg);color:var(--tlight);font-family:var(--font);min-height:40px;
  transition:all .2s ease;-webkit-tap-highlight-color:transparent;
}
.sub-nav button.active{background:var(--lgreen);color:var(--dgreen);font-weight:600;box-shadow:0 2px 8px rgba(132,151,116,.12)}

/* buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:4px;
  padding:11px 20px;border-radius:22px;font-size:14px;font-weight:600;
  border:none;cursor:pointer;transition:all .2s;font-family:var(--font);
  -webkit-tap-highlight-color:transparent;
}
.btn:active{transform:scale(.96)}
.btn-p{background:var(--green);color:#fff;box-shadow:0 3px 12px rgba(93,107,78,.25)}
.btn-p:hover{box-shadow:0 5px 18px rgba(93,107,78,.35);transform:translateY(-1px)}
.btn-o{background:var(--card);color:var(--green);border:2px solid var(--green)}
.btn-o:hover{background:var(--lgreen)}
.btn-s{padding:6px 14px;font-size:12px;border-radius:16px}
.btn-l{background:none;color:var(--green);font-size:12px;padding:6px 10px;text-decoration:underline;font-weight:400}
.btn-d{background:rgba(204,158,138,.12);color:var(--heart);font-size:11px;padding:4px 12px;border-radius:12px;border:none;cursor:pointer;font-family:var(--font)}

/* inputs */
.input,.textarea{
  width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:12px;
  font-size:14px;font-family:var(--font);background:var(--bg);color:var(--text);
  transition:.2s;resize:vertical;
}
.input:focus,.textarea:focus{outline:none;border-color:var(--green);background:var(--card)}

/* ── HOME ── */
.greeting{font-size:22px;font-weight:700;color:var(--dbrown);margin-bottom:2px}
.greeting-sub{font-size:13px;color:var(--tlight);margin-bottom:12px}
.streak-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.streak-chip{
  display:inline-flex;align-items:center;gap:4px;padding:6px 12px;
  border-radius:16px;font-size:12px;font-weight:600;
  background:linear-gradient(135deg,#fff9e6,#ffecd6);color:#9b6b3d;
}
.streak-chip.fire{background:linear-gradient(135deg,#ffe8e0,#ffd4c4);color:#c06040}
.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.quick-item{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:14px 8px;border-radius:14px;background:var(--bg);
  border:1px solid var(--bdl);cursor:pointer;transition:all .2s;
  font-size:11px;color:var(--text);text-align:center;font-family:var(--font);
}
.quick-item:active{transform:scale(.95);background:var(--lgreen)}
.quick-item .qi{font-size:28px;line-height:1}
.daily-card{
  background:linear-gradient(135deg,var(--lgreen),#f5f7f0);
  border-radius:var(--radius);padding:16px;text-align:center;
  border:1px solid rgba(132,151,116,.12);
}
.daily-card .dc-q{font-size:13px;color:var(--dgreen);font-style:italic;line-height:1.8}

/* ── FOCUS ── */
.ring-wrap{position:relative;width:200px;height:200px;margin:0 auto}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-wrap svg circle:first-child{filter:drop-shadow(0 1px 2px rgba(77,63,47,.04))}
#ring{filter:drop-shadow(0 2px 8px rgba(132,151,116,.2));transition:stroke .5s,stroke-dashoffset .3s}
.ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-text .time{font-size:40px;font-weight:700;font-family:"SF Mono","Cascadia Code","Consolas",monospace;color:var(--dbrown)}
.ring-text .mode{font-size:13px;color:var(--tlight);margin-top:6px}
.breath-circle{
  border-radius:50%;margin:0 auto;transition:all .8s ease;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 30px rgba(132,151,116,.2),0 4px 20px rgba(77,63,47,.08);
  position:relative;
}
.breath-circle::after{
  content:'';position:absolute;inset:-6px;border-radius:50%;
  border:2px solid rgba(132,151,116,.15);opacity:0;transition:opacity .4s;
}
.breath-circle.active-glow::after{opacity:1;animation:breathGlow 2s ease-in-out infinite}
@keyframes breathGlow{0%,100%{inset:-6px;opacity:.3}50%{inset:-14px;opacity:.08}}
.breath-circle .label{color:#fff;font-size:18px;font-weight:700;text-shadow:0 1px 2px rgba(0,0,0,.1);position:relative;z-index:1}

/* ── MOOD ── */
.mood-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.mood-btn{
  width:50px;height:50px;border-radius:50%;border:3px solid transparent;
  font-size:26px;background:var(--bg);cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(77,63,47,.04);
}
.mood-btn:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(77,63,47,.1)}
.mood-btn:active,.mood-btn.sel{transform:scale(1.12);border-color:var(--green);background:var(--lgreen);box-shadow:0 4px 16px rgba(132,151,116,.2)}

/* ── JOURNAL ── */
.j-entry{background:var(--bg);border-radius:12px;padding:12px 14px;margin-bottom:6px;border-left:3px solid var(--green)}
.j-entry .j-date{font-size:11px;color:var(--tmuted)}
.j-entry .j-content{font-size:13px;line-height:1.7;margin-top:4px;white-space:pre-line}

/* ── GROWTH ── */
.book-card{
  background:var(--bg);border-radius:12px;padding:12px 14px;margin-bottom:8px;
  border:1px solid var(--bdl);border-left:4px solid var(--green);
}
.book-card .bc-status{font-size:10px;padding:2px 8px;border-radius:8px;display:inline-block;margin-top:4px}
.list-item{
  padding:11px 14px;border-radius:11px;margin-bottom:6px;
  cursor:pointer;background:var(--bg);border-left:3px solid transparent;
  transition:all .2s;font-size:14px;
}
.list-item:hover{background:var(--lgreen);transform:translateX(2px)}
.list-item.sel{background:var(--lgreen);border-left-color:var(--green);box-shadow:0 2px 8px rgba(132,151,116,.1)}

/* ── PROFILE ── */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:10px}
.stat-item{
  background:var(--bg);border-radius:12px;padding:14px;text-align:center;
  border:1px solid var(--bdl);
}
.stat-item .sv{font-size:24px;font-weight:700;color:var(--dbrown)}
.stat-item .sl{font-size:11px;color:var(--tlight);margin-top:2px}
.achieve-row{display:flex;gap:6px;flex-wrap:wrap}
.achieve-badge{
  padding:8px 12px;border-radius:12px;font-size:12px;text-align:center;
  background:var(--bg);border:1px solid var(--bdl);min-width:60px;
}
.achieve-badge.earned{background:linear-gradient(135deg,#fff9e6,#ffecd6);border-color:var(--accent)}
.achieve-badge .ab-icon{font-size:22px;display:block}

/* toast */
.toast{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(77,63,47,.88);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  color:#fff;padding:12px 24px;border-radius:20px;font-size:14px;z-index:999;pointer-events:none;
  opacity:0;transition:opacity .25s ease;box-shadow:0 8px 32px rgba(77,63,47,.15);
}
.toast.show{opacity:1}

/* ── HEALING ── */
.heal-emotion-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.heal-emotion-item{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:12px 6px;border-radius:14px;background:var(--bg);
  border:2px solid transparent;cursor:pointer;transition:all .2s;
  font-size:11px;color:var(--text);text-align:center;font-family:var(--font);
}
.heal-emotion-item:active,.heal-emotion-item.sel{transform:scale(.95);border-color:var(--green);background:var(--lgreen)}
.heal-emotion-item .ei{font-size:26px;line-height:1}
.chat-bubble{
  max-width:88%;padding:12px 16px;border-radius:18px;font-size:14px;line-height:1.8;
  margin-bottom:10px;animation:fadeIn .3s ease;
}
.chat-bubble.agent{
  background:var(--lgreen);color:var(--dbrown);margin-right:auto;
  border-bottom-left-radius:6px;border:1px solid rgba(132,151,116,.1);
}
.chat-bubble.user{
  background:var(--green);color:#fff;margin-left:auto;
  border-bottom-right-radius:6px;
}
.chat-step{
  display:inline-block;font-size:10px;padding:3px 10px;border-radius:10px;
  margin-bottom:6px;font-weight:600;letter-spacing:1px;
}
.chat-step.awake{background:rgba(139,164,176,.15);color:var(--blue)}
.chat-step.see{background:rgba(204,158,138,.15);color:var(--heart)}
.chat-step.accept{background:rgba(212,184,122,.2);color:#8b6914}
.chat-step.heal{background:rgba(132,151,116,.15);color:var(--dgreen)}
.exercise-card{
  background:linear-gradient(135deg,var(--lgreen),#f5f7f0);
  border-radius:14px;padding:14px;margin-bottom:8px;
  border:1px solid rgba(132,151,116,.12);cursor:pointer;transition:all .2s;
}
.exercise-card:active{transform:scale(.98);box-shadow:0 4px 16px rgba(132,151,116,.15)}
.exercise-card .ex-num{
  display:inline-flex;align-items:center;justify-content:center;
  width:28px;height:28px;border-radius:50%;background:var(--green);
  color:#fff;font-size:13px;font-weight:700;margin-right:8px;
}
.book-card{
  background:linear-gradient(135deg,#fefcf7,#f7f3e8);
  border-radius:16px;padding:16px;margin-bottom:10px;
  border:1px solid rgba(155,139,116,.15);cursor:pointer;transition:all .2s;
  box-shadow:0 2px 12px rgba(77,63,47,.04);
}
.book-card:active{transform:scale(.98);box-shadow:0 4px 16px rgba(155,139,116,.12)}
.book-card .book-fw{
  font-size:12px;color:var(--dgreen);background:var(--lgreen);
  display:inline-block;padding:4px 10px;border-radius:20px;margin-top:8px;
}
.takeaway-chip{
  display:inline-block;background:rgba(212,184,122,.15);color:#8b6914;
  font-size:11px;padding:2px 8px;border-radius:10px;margin-top:4px;
}

/* focus-visible */
:focus-visible{outline:2px solid var(--green);outline-offset:2px;border-radius:4px}
button:focus-visible,a:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible{outline:2px solid var(--green);outline-offset:2px}

@media(min-width:600px){
  .app{border-left:1px solid var(--bdl);border-right:1px solid var(--bdl)}
  .mood-btn{width:56px;height:56px;font-size:28px}
  .ring-wrap{width:240px;height:240px}
  .ring-text .time{font-size:46px}
  .quick-item{padding:18px 10px}
  .quick-item .qi{font-size:32px}
  .bottom-nav{max-width:520px}
  .nav-item{font-size:10px}
  .nav-item .ni{font-size:22px}
  .heal-emotion-grid{grid-template-columns:repeat(4,1fr);gap:8px}
  .heal-emotion-item{padding:14px 8px}
  .heal-emotion-item .ei{font-size:30px}
}
</style>
<!-- Supabase loaded asynchronously at end of body — no render blocking -->
</head>
<body>
<!-- floating decorations -->
<div class="deco-f d1">🍃</div>
<div class="deco-f d2">🌿</div>
<div class="deco-f d3">🍂</div>
<div class="deco-f d4">🪷</div>
<div class="deco-f d5">✨</div>

<div class="app">
  <div class="header">
    <h1>🌿 心灵驿站</h1>
    <div class="sub">疗愈 · 成长 · 觉醒</div>
  </div>

  <!-- ═══════════ HOME ═══════════ -->
  <!-- ═══════════ TODAY ═══════════ -->
  <div class="page active" id="page-today">
    <!-- Date Navigator -->
    <div class="card" style="display:flex;align-items:center;justify-content:center;gap:12px;padding:10px 14px">
      <button class="btn btn-o btn-s" onclick="TODAY.goDay(-1)">◀</button>
      <span style="font-size:16px;font-weight:700;color:var(--dbrown);cursor:pointer" id="td-date-label" onclick="TODAY.pickDate()">今天</span>
      <button class="btn btn-o btn-s" onclick="TODAY.goDay(1)">▶</button>
      <input type="date" id="td-date-picker" style="display:none;position:absolute" onchange="TODAY.onDatePick()">
    </div>

    <!-- Daily Awakening -->
    <div class="card" id="td-awakening" style="cursor:pointer" onclick="TODAY.nextAwakening()">
      <div style="font-size:12px;color:var(--tlight);margin-bottom:4px">🌅 每日觉醒</div>
      <div style="font-size:15px;font-weight:600;color:var(--dbrown);line-height:1.7;margin-bottom:6px" id="td-aw-quote"></div>
      <div style="font-size:13px;color:var(--text);line-height:1.8;white-space:pre-line" id="td-aw-content"></div>
      <div style="font-size:11px;color:var(--tmuted);margin-top:4px" id="td-aw-source"></div>
    </div>

    <!-- Mood + Diary (merged) -->
    <div class="card">
      <div style="font-size:15px;font-weight:700;color:var(--dgreen);margin-bottom:8px" id="td-mood-title">今日心情</div>
      <div class="mood-btns" id="td-mbtns">
        <button class="mood-btn" onclick="TODAY.setMood(1)" style="background:#ffe8e0">😢</button>
        <button class="mood-btn" onclick="TODAY.setMood(2)" style="background:#ffecd6">😕</button>
        <button class="mood-btn" onclick="TODAY.setMood(3)" style="background:#fff9e6">😐</button>
        <button class="mood-btn" onclick="TODAY.setMood(4)" style="background:#e6f0df">😀</button>
        <button class="mood-btn" onclick="TODAY.setMood(5)" style="background:#d4e5cb">😊</button>
      </div>
      <div style="margin:6px 0;font-size:13px;color:var(--tlight)" id="td-mood-label"></div>
      <textarea class="textarea" id="td-diary" rows="4" placeholder="今天想记录什么？任何想法、感受、故事..."></textarea>
    </div>

    <!-- Gratitude -->
    <div class="card">
      <div style="font-size:15px;font-weight:700;color:var(--dgreen);margin-bottom:8px" id="td-grat-title">🙏 今日感恩</div>
      <div style="font-size:11px;color:var(--tlight);margin-bottom:8px">每天写下 3 件值得感恩的小事</div>
      <input class="input" id="td-g1" placeholder="① ..." style="margin-bottom:4px">
      <input class="input" id="td-g2" placeholder="② ..." style="margin-bottom:4px">
      <input class="input" id="td-g3" placeholder="③ ...">
    </div>

    <!-- Actions -->
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-p" style="flex:1" onclick="TODAY.save()">💾 保存</button>
      <button class="btn btn-o" style="flex:1" onclick="TODAY.exportDay()">📤 导出今日</button>
    </div>

    <!-- Mood trend mini -->
    <div class="card" style="margin-top:10px">
      <div class="card-t">📊 心情趋势</div>
      <div style="overflow-x:auto"><svg id="td-chart" width="100%" height="140" viewBox="0 0 400 140"></svg></div>
    </div>
  </div>

  <!-- ═══════════ FOCUS ═══════════ -->
  <div class="page" id="page-focus">
    <div class="sub-nav">

// ═══════════════ STORAGE ═══════════════
var S={
  get:function(k,d){try{var v=localStorage.getItem('mh_'+k);return v?JSON.parse(v):d}catch(e){return d}},
  set:function(k,v){try{localStorage.setItem('mh_'+k,JSON.stringify(v))}catch(e){}}

// ── Supabase helpers ──
async function _push(k,v){
  var uid=await _getUid();if(!uid)return;
  try{
    if(k==='moods'){var last=v[v.length-1];if(last)await sb.from('moods').insert([{user_id:uid,level:last.level,note:last.note||'',time:last.time}]);}
    else if(k==='books'){var last=v[v.length-1];if(last&&!last.supabase_id){var r=await sb.from('books').insert([{user_id:uid,title:last.title,author:last.author||'',status:last.status||'want',progress:last.progress||'',note:last.note||'',added:last.added}]).select('id').single();if(r.data){last.supabase_id=r.data.id;S.set('books',v);}}}
    else if(k==='pomo_sessions'||k==='pomo_date'){var ss=S.get('pomo_sessions',0),sd=S.get('pomo_date','');await sb.from('pomo').upsert({user_id:uid,sessions:ss,date:sd},{onConflict:'user_id'});}
    else if(k.indexOf('grat_')===0){var d=k.replace('grat_','');await sb.from('gratitude').upsert({user_id:uid,date:d,entry1:v[0]||'',entry2:v[1]||'',entry3:v[2]||''},{onConflict:'user_id,date'});}
    else if(k.indexOf('write_')===0){var d=k.replace('write_','');await sb.from('diary').upsert({user_id:uid,date:d,content:v},{onConflict:'user_id,date'});}
    else if(k.indexOf('heal_write_')===0){var idx=parseInt(k.replace('heal_write_',''));await sb.from('healing_write').upsert({user_id:uid,prompt_index:idx,content:v},{onConflict:'user_id,prompt_index'});}
  }catch(e){console.log('push err:',e.message)}
}
async function syncFromServer(cb){
  var uid=await _getUid();if(!uid){if(cb)cb('no-auth');return;}
  try{
    var ress=await Promise.all([
      sb.from('moods').select('level,note,time').eq('user_id',uid).order('time'),
      sb.from('books').select('id,title,author,status,progress,note,added').eq('user_id',uid).order('added'),
      sb.from('pomo').select('sessions,date').eq('user_id',uid).maybeSingle(),
      sb.from('gratitude').select('date,entry1,entry2,entry3').eq('user_id',uid).order('date'),
      sb.from('diary').select('date,content').eq('user_id',uid).order('date'),
      sb.from('healing_write').select('prompt_index,content').eq('user_id',uid).order('prompt_index')
    ]);
    var serverMoods=ress[0].data||[],serverBooks=(ress[1].data||[]).map(function(b){b.supabase_id=b.id;return b}),
        serverPomo=ress[2].data||{sessions:0,date:''},
        serverGratitudes=ress[3].data||[],serverDiaries=ress[4].data||[],serverHealing=ress[5].data||[];
    var hasData=serverMoods.length||serverBooks.length||serverGratitudes.length||serverDiaries.length||serverHealing.length||(serverPomo.sessions||0)>0;
    if(!hasData){if(cb)cb('empty');return;}
    // Clear old date-based localStorage keys then populate
    var keys=[];for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k.indexOf('mh_grat_20')===0||k.indexOf('mh_write_20')===0||k.indexOf('mh_heal_write_')===0)keys.push(k);}
    keys.forEach(function(k){localStorage.removeItem(k)});
    localStorage.setItem('mh_moods',JSON.stringify(serverMoods));
    localStorage.setItem('mh_books',JSON.stringify(serverBooks));
    localStorage.setItem('mh_pomo_sessions',JSON.stringify(serverPomo.sessions||0));
    localStorage.setItem('mh_pomo_date',JSON.stringify(serverPomo.date||''));
    serverGratitudes.forEach(function(g){localStorage.setItem('mh_grat_'+g.date,JSON.stringify([g.entry1||'',g.entry2||'',g.entry3||'']));});
    serverDiaries.forEach(function(d){localStorage.setItem('mh_write_'+d.date,JSON.stringify(d.content||''));});
    serverHealing.forEach(function(h){localStorage.setItem('mh_heal_write_'+h.prompt_index,JSON.stringify(h.content||''));});
    if(cb)cb('server');
  }catch(e){console.log('sync err:',e.message);if(cb)cb('error');}
}
async function _getUid(){ if(!sb)return null; try{var s=(await sb.auth.getSession()).data?.session;return s?s.user.id:null}catch(e){return null} }

async function pushLocalToServer(){
  var uid=await _getUid();if(!uid)return;
  try{
    var moods=S.get('moods',[]),books=S.get('books',[]);
    if(moods.length){await sb.from('moods').insert(moods.map(function(m){return{user_id:uid,level:m.level,note:m.note||'',time:m.time}}));}
    if(books.length){await sb.from('books').insert(books.map(function(b){return{user_id:uid,title:b.title,author:b.author||'',status:b.status||'want',progress:b.progress||'',note:b.note||'',added:b.added}}));}
    var ss=S.get('pomo_sessions',0),sd=S.get('pomo_date','');
    if(ss>0){await sb.from('pomo').upsert({user_id:uid,sessions:ss,date:sd},{onConflict:'user_id'});}
    for(var i=0;i<localStorage.length;i++){
      var k=localStorage.key(i),v=JSON.parse(localStorage.getItem(k));
      if(k.indexOf('mh_grat_20')===0){var d=k.replace('mh_grat_','');await sb.from('gratitude').upsert({user_id:uid,date:d,entry1:v[0]||'',entry2:v[1]||'',entry3:v[2]||''},{onConflict:'user_id,date'});}
      if(k.indexOf('mh_write_20')===0){var d=k.replace('mh_write_','');if(v)await sb.from('diary').upsert({user_id:uid,date:d,content:v},{onConflict:'user_id,date'});}
      if(k.indexOf('mh_heal_write_')===0){var idx=parseInt(k.replace('mh_heal_write_',''));if(v)await sb.from('healing_write').upsert({user_id:uid,prompt_index:idx,content:v},{onConflict:'user_id,prompt_index'});}
    }
    T('本地数据已同步到云端');
  }catch(e){console.log('pushLocal err:',e.message)}
}
function T(t){var e=document.getElementById('toast');e.textContent=t;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(function(){e.classList.remove('show')},1800)}

// ═══════════════ EXPORT/IMPORT ═══════════════
function exportData(){
  var data={};
  for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k.startsWith('mh_'))data[k]=JSON.parse(localStorage.getItem(k))}
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='xinlingyizhan_'+today()+'.json';a.click();T('数据已导出 ✓')
}
function importData(){
  var inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{var data=JSON.parse(ev.target.result);var count=0;for(var k in data){localStorage.setItem(k,JSON.stringify(data[k]));count++}T('已导入 '+count+' 条记录 ✓');setTimeout(function(){location.reload()},1000)}catch(err){T('导入失败')}
    };reader.readAsText(file);
  };inp.click();
}

var H={
  quotes:[
    '每一步都算数，每一个当下都值得被温柔对待。',

    if(h<6){g='夜深了';gs='好好休息，明天会更好'}else if(h<9){g='早上好';gs='新的一天，从爱自己开始'}else if(h<12){g='上午好';gs='精力充沛，专注当下'}else if(h<14){g='中午好';gs='记得好好吃饭，休息一下'}else if(h<18){g='下午好';gs='下午的时光，温柔而坚定'}else if(h<21){g='晚上好';gs='放下一天的疲惫，给自己一点温柔'}else{g='夜深了';gs='感恩今天的每一刻，晚安'}
    document.getElementById('greeting').textContent=g+' 🌿';
    document.getElementById('greeting-sub').textContent=gs;

    // streak
    var moods=S.get('moods',[]),streak=0,d=new Date();
    for(var i=0;i<365;i++){
      var ds=d.toISOString().slice(0,10),found=false;
      if(moods.some(function(r){return r.time.slice(0,10)===ds}))found=true;

      if(S.get('write_'+ds,'').trim())found=true;

  // Breathing
  breath:{running:false,phase:0,elapsed:0,cycles:0,total:3,timer:null,

    getP:function(){return this.patterns[document.getElementById('bpat').value]}
  },
  renderBreath:function(){
    document.getElementById('bdesc').textContent=this.breath.getP().desc;
  },
  toggleBreath:function(){
    var b=this.breath,self=this,c=document.getElementById('bc');
    if(b.running){b.running=false;document.getElementById('btoggle').textContent='▶ 继续';clearInterval(b.timer);c.classList.remove('active-glow')}
    else{b.running=true;document.getElementById('btoggle').textContent='⏸ 暂停';b.timer=setInterval(function(){self.tickBreath()},1000);c.classList.add('active-glow')}
  },
  tickBreath:function(){
    var b=this.breath,p=b.getP(),dur=p.durs[b.phase],label=p.labels[b.phase],ph=p.phases[b.phase];
    var scale=ph==='inhale'?b.elapsed/dur:ph==='hold'?1:1-b.elapsed/dur;
    var minR=60,maxR=120,r=minR+(maxR-minR)*scale;
    var c=document.getElementById('bc');c.style.width=r+'px';c.style.height=r+'px';
    c.querySelector('.label').textContent=label;
    c.style.background=ph==='inhale'?'var(--green)':ph==='hold'?'var(--accent)':'var(--blue)';
    document.getElementById('bphase').textContent=label+'... ('+(dur-b.elapsed)+'秒)';
    document.getElementById('bcycle').textContent='已完成 '+b.cycles+'/'+b.total+' 次循环';
    b.elapsed++;
    if(b.elapsed>=dur){
      b.elapsed=0;b.phase++;
      if(b.phase>=p.phases.length){
        b.phase=0;b.cycles++;b.total=parseInt(document.getElementById('bcyc').value)||3;
        if(b.cycles>=b.total){
          b.running=false;clearInterval(b.timer);
          document.getElementById('btoggle').textContent='▶ 开始练习';
          document.getElementById('bphase').textContent='练习完成！感觉好点了吗？🌸';
          document.getElementById('bcycle').textContent='';
          c.style.width='120px';c.style.height='120px';c.querySelector('.label').textContent='完成';
          c.style.background='var(--green)';c.classList.remove('active-glow');vibrate(300);return;
        }
      }
    }
  },
  resetBreath:function(){
    var b=this.breath;b.running=false;b.phase=0;b.elapsed=0;b.cycles=0;b.total=parseInt(document.getElementById('bcyc').value)||3;
    clearInterval(b.timer);document.getElementById('btoggle').textContent='▶ 开始练习';
    document.getElementById('bphase').textContent='点击开始，跟随引导呼吸';
    document.getElementById('bcycle').textContent='';
    var c=document.getElementById('bc');c.style.width='120px';c.style.height='120px';
    c.querySelector('.label').textContent='准备';c.style.background='var(--green)';
    c.classList.remove('active-glow');
    document.getElementById('bdesc').textContent=b.getP().desc;
  }
};

  {quote:'我们听到的一切都是观点，不是事实。我们看到的一切都是视角，不是真相。',content:'马可·奥勒留在《沉思录》中写下的这句话提醒每一个容易被别人影响的人：别人的评价，是他们的视角，不是你的定义。一个人说你不好，那是他站在自己角度看到的。你不必把别人的视角当作自己的真相。',source:'《沉思录》马可·奥勒留'},
  {quote:'生活不是等待暴风雨过去，而是学会在雨中跳舞。',content:'我们总在等：等忙完这阵、等心情好了、等条件具备了。可是生活就在等待中过去了。不是某一天才开始，就是此刻——带着所有的不完美、不安和不确定，开始你想做的事。',source:'维维安·格林'},
  {quote:'幸福不是目标，而是一种副产品。',content:'埃莉诺·罗斯福观察到的这个道理很多人都错过了。幸福不能直接追求——越追它越远。幸福是在你全情投入一件事、关心一个人、认真过一天的时候，悄悄从旁边生长出来的。不要追幸福，追你真正在意的事，幸福会跟着来。',source:'埃莉诺·罗斯福'},
  {quote:'你之所以无法改变，是因为自己不断下着不改变的决心。',content:'哲人对年轻人的这句话像一面镜子。我们嘴上说想改变，但每一个"明天再说""等条件合适""道理都懂就是做不到"，都是在给自己下不改变的决心。改变不需要完美的时机，只需要一个"现在就开始"的决定。',source:'《被讨厌的勇气》岸见一郎'},
  {quote:'当我接受我本来的样子时，我就能改变了。',content:'卡尔·罗杰斯这句话说透了一切疗愈的本质。我们以为改变是变成更好的自己，但真正的改变始于接受此刻的自己。不是接受后就放弃了，而是接受后才自由了——你不再花力气对抗自己，所有的力都可以用来向前走。',source:'《成为一个人》卡尔·罗杰斯'},
  {quote:'爱是理解的别名。',content:'泰戈尔这句话七个字说清了关系的核心。我们以为爱是激情、是付出、是为对方好。但真正让人感到被爱的，是被理解。一个人努力理解你的感受，不评判、不打断、不急着给建议——那才是爱的全部。',source:'泰戈尔'},
  {quote:'每天反复做的事情造就了我们。优秀，不是一种行为，而是一种习惯。',content:'亚里士多德这句话是所有自我改变的基础。你不是某一天突然变成谁，而是你每天做的小事积累出了你是谁。太关注结果而忽略过程，就容易急功近利。关注每一天做对的微小动作，结果会自然到来。',source:'亚里士多德'},
  {quote:'每一个指责背后，都有一个未被满足的需要在哭泣。',content:'当有人对你发脾气，当伴侣莫名烦躁，当孩子无理取闹——试着不要回应表面的攻击，而去寻找背后的需要。每个人都只是在用自己的方式（即使是笨拙的、伤害人的方式）表达"我需要被尊重、被看见、被爱"。',source:'《非暴力沟通》马歇尔·卢森堡'},
  {quote:'树木爱得深沉。它们扎根大地，不追逐风的方向。',content:'如果你感到焦虑，想象自己是一棵树。风来了，枝叶会摇，但根不动。树不会说风太大了我受不了，树只是在那里，稳稳地。你的根是什么？是那些不随外界变化而改变的东西——你的价值观、你真正爱的人。',source:'禅意散文'},
  {quote:'人生最大的谎言，就是此时此刻之外还有一个更值得活的人生。',content:'我们总在等——等考上、等升职、等还完房贷、等孩子长大。好像有一个真正的人生在未来等着我们。但人生不在未来，人生就是现在——在喝这杯水、回这条消息、过这一分钟。不要等待，活着。',source:'《被讨厌的勇气》岸见一郎'},
  {quote:'你不是你的思想，你是观察思想的人。',content:'正念冥想的核心就这一句话。你脑子里的焦虑声音、自我批评的声音、灾难化想象的声音——那些都不是你。你是那个能听见这些声音的人。当你意识到"我正在想"，你就从思想中退了一步，那一刻，你是自由的。',source:'《当下的力量》埃克哈特·托利'},
  {quote:'在刺激和反应之间，有一个空间。在那个空间里，有我们选择反应的自由和力量。',content:'弗兰克尔在集中营里发现了这个真理：你可以被剥夺一切，但没有人能剥夺你选择如何回应的自由。别人说一句话，你可以自动愤怒，也可以在听到和回应之间停顿片刻。那个片刻，就是你的力量所在。',source:'《活出生命的意义》维克多·弗兰克尔'},
  {quote:'改变自己是神，改变别人是神经病。',content:'最消耗人的事情就是试图改变伴侣、孩子、父母、朋友。所有关系中最痛苦的人，都是那些想让别人变成自己想要的样子的人。记住课题分离：你能不能改变自己是你的课题，别人改不改变是别人的课题。',source:'佚名智慧格言'},
  {quote:'真正的发现之旅不在于寻找新的风景，而在于拥有新的眼睛。',content:'普鲁斯特这句话适用于每一个感到无聊的时刻。不需要去一个新地方才能感到新鲜。换一双眼睛看同样的街道、同样的人、同样的生活——把理所当然变成奇迹，每一刻都可以是新的。',source:'马塞尔·普鲁斯特'},
  {quote:'一个人知道自己为什么而活，就可以忍受任何一种生活。',content:'尼采。找到你的为什么——它不需要宏大，可以是"我想让孩子看到什么是勇敢"，可以是"我想看看自己能做到什么程度"。当你知道为什么，过程中所有的苦都变成了值得的苦。',source:'尼采'},
  {quote:'恐惧敲门，勇气去开门，结果门外什么都没有。',content:'大多数我们焦虑的事情，根本不会发生。我们的头脑擅长制造恐惧——最坏的情况、别人的评价、未来的灾难。但它们敲门的时候，不要怕。打开门看看，十有八九，外面什么都没有。',source:'禅语'},
  {quote:'种一棵树最好的时间是十年前，其次是现在。',content:'不管你想做什么——学一个技能、修复一段关系、改变一个习惯——最好的开始时间是十年前。但现在排在第二。不要因为晚了十年就不开始。十年后你会感谢今天开始的自己。',source:'中国谚语'},
  {quote:'幸福取决于我们把生活解释成什么。',content:'阿德勒这句话和认知行为疗法完全一致。不是你遇到了什么决定了你的感受，而是你怎么解释它。被批评等于"我太差劲了"还是"对方在意这件事所以愿意说出来"？同一个事实，不同的解释，不同的情绪体验。',source:'阿尔弗雷德·阿德勒'},
  {quote:'不要让你不能做的事情，妨碍你能做的事情。',content:'伍登教练这句话是行动主义的精髓。我们常常因为"我做不到XXX"就放弃了"我能做YYY"。不能跑步30分钟？走10分钟也好的。不能写一篇完美文章？先写一段也好的。不要让不能阻止能。',source:'约翰·伍登'},
  {quote:'我们生活在一个时刻，而不是一整天里。',content:'忘记今天要完成多少事吧。就这个时刻——你正在做什么？把它做好。人生的质量不是按天算的，是按这个时刻算的。每一个感到专注的时刻，都是你真正活着的时刻。',source:'正念格言'},
  {quote:'人与人之间最远的距离，是我站在你面前，你却没有看见我。',content:'你有没有这样的经历：和别人说话时，对方在看手机、在想怎么回应、在等你说完？那感觉就是"我没被看见"。反过来，当有人看着你的眼睛、认真地听、不急着打断——那感觉就是"我被看见了"。今天试着给一个人被看见的体验。',source:'心理治疗共通观察'},
  {quote:'我们对最坏情况的恐惧，往往比最坏情况本身更糟糕。',content:'焦虑的本质是：我们害怕一个还没发生的事情。你躺在床上想明天的事、想一周后的事、想一年后的事——身体在现在，脑子在未来。这时候需要的是：回到现在。此刻，你的呼吸是平稳的，你是安全的。',source:'认知行为疗法'},
  {quote:'勇气不是没有恐惧，而是判断有些东西比恐惧更重要。',content:'你不需要不害怕才开始。你只需要决定：我想做的事，比我的恐惧更重要。害怕被拒绝，但还是去说了。害怕失败，但还是去做了。每一次这样做，勇气就长出一点肌肉。',source:'纳尔逊·曼德拉启发'},
  {quote:'宁静不是没有噪音，而是在噪音中依然平静。',content:'我们不能控制外面的世界——永远有干扰、有坏消息、有别人的意见。但内在的宁静不是靠消除噪音实现的，而是通过在噪音中保持中心练习出来的。每一次你选择不被外界牵着走，就在训练这个能力。',source:'正念冥想教导'},
  {quote:'我们需要的不是一个新的生活，而是一双新的眼睛。',content:'同样的工作、同样的关系、同样的城市——当你开始留意平时忽略的细节（同事的一个笑容、路边新开的花、咖啡的温度），生活就变了。不是生活在变，是你的注意力在变。而注意力，是你可以控制的。',source:'《心流》启发'},
  {quote:'每一次说是给不重要的事，就是在说不给真正重要的事。',content:'时间管理的本质不是把更多事塞进一天，而是决定什么不值得你的时间。你今天的时间花在了哪里？有多少是别人觉得重要的事？有多少是你自己真正在意的事？',source:'《深度工作》启发'},
  {quote:'感谢是最高形式的思考，感恩是惊喜的近亲。',content:'当你刻意寻找值得感谢的事物时，你的大脑会从问题扫描模式切换到资源扫描模式。这不是正能量鸡汤，这是认知重构——你看到的世界，很大程度上是你选择看到的世界。',source:'积极心理学研究'},
  {quote:'人生不是等待风暴过去，而是学会在雨中起舞。',content:'我们常常以为，等困难过去了、等心情好了、等一切准备就绪了，才开始真正的生活。但生活的真相是：风暴永远不会完全停止。学会在不确定中前行，在焦虑中行动，在不安中依然温柔对待自己——这才是生活的全部艺术。',source:'禅意智慧'}
];

var TODAY={
  date:new Date().toISOString().slice(0,10),

  init:function(){
    this.renderDateLabel();
    this.loadMood();
    this.loadDiary();
    this.loadGratitude();
    this.loadAwakening();
    this.drawChart();
  },

  // ── Date ──
  goDay:function(delta){
    var d=new Date(this.date+'T00:00:00');
    d.setDate(d.getDate()+delta);
    this.date=d.toISOString().slice(0,10);
    this.init();
  },

  renderDateLabel:function(){
    var d=new Date(this.date+'T00:00:00');
    var today=new Date().toISOString().slice(0,10);
    var isToday=this.date===today;
    var label='';
    if(isToday)label='今天';
    else{var m=d.getMonth()+1;var day=d.getDate();label=m+'月'+day+'日';}
    var w=['日','一','二','三','四','五','六'];
    label+=' 星期'+w[d.getDay()];
    var moods=S.get('moods',[]);var self=this;
    var hasMood=moods.some(function(x){return x.time&&x.time.slice(0,10)===self.date});
    var hasDiary=S.get('write_'+this.date,'');
    var hasGrat=S.get('grat_'+this.date,['','','']).join('');
    if(hasMood||hasDiary||hasGrat)label+=' ●';
    document.getElementById('td-date-label').textContent=label;
    // Update card titles based on date
    var prefix=isToday?'今日':'📝 补录';
    document.getElementById('td-mood-title').textContent=prefix+'心情'+(isToday?'':' ('+label.split(' ')[0]+')');
    document.getElementById('td-grat-title').textContent='🙏 '+prefix+'感恩'+(isToday?'':' ('+label.split(' ')[0]+')');
    document.getElementById('td-diary').placeholder=isToday?'今天想记录什么？任何想法、感受、故事...':'补充这天的日记...';
  },

  pickDate:function(){
    var inp=document.getElementById('td-date-picker');
    inp.style.display='block';inp.value=this.date;
    inp.showPicker();
  },

  onDatePick:function(){
    var v=document.getElementById('td-date-picker').value;
    document.getElementById('td-date-picker').style.display='none';
    if(v){this.date=v;this.init();}
  },

  // ── Mood ──
  _selectedMood:null,

  setMood:function(level){
    var labels={1:'😢 难过',2:'😕 低落',3:'😐 平静',4:'😀 开心',5:'😊 幸福'};
    document.getElementById('td-mood-label').textContent='已选：'+labels[level];
    this._selectedMood=level;
    var btns=document.querySelectorAll('#td-mbtns .mood-btn');
    btns.forEach(function(b){b.classList.remove('sel')});
    btns[level-1].classList.add('sel');
  },

  loadMood:function(){
    var self=this;this._selectedMood=null;
    var moods=S.get('moods',[]);
    var btns=document.querySelectorAll('#td-mbtns .mood-btn');
    btns.forEach(function(b){b.classList.remove('sel')});
    moods.forEach(function(m){if(m.time&&m.time.slice(0,10)===self.date)self._selectedMood=m.level;});
    if(this._selectedMood){
      var labels={1:'😢 难过',2:'😕 低落',3:'😐 平静',4:'😀 开心',5:'😊 幸福'};
      document.getElementById('td-mood-label').textContent='已记录：'+labels[this._selectedMood];
      btns[this._selectedMood-1].classList.add('sel');
    }else{
      document.getElementById('td-mood-label').textContent='';
    }
  },

  // ── Diary ──
  loadDiary:function(){
    document.getElementById('td-diary').value=S.get('write_'+this.date,'');
  },

  // ── Gratitude ──
  loadGratitude:function(){
    var g=S.get('grat_'+this.date,['','','']);
    document.getElementById('td-g1').value=g[0]||'';
    document.getElementById('td-g2').value=g[1]||'';
    document.getElementById('td-g3').value=g[2]||'';
  },

  // ── Save ──
  save:function(){
    var self=this;
    if(this._selectedMood){
      var moods=S.get('moods',[]),found=false;
      moods.forEach(function(m){if(m.time&&m.time.slice(0,10)===self.date){m.level=self._selectedMood;m.note=m.note||'';found=true;}});
      if(!found)moods.push({level:this._selectedMood,note:'',time:this.date+'T'+new Date().toTimeString().slice(0,5)});
      S.set('moods',moods);_push('moods',moods);
    }
    var diary=document.getElementById('td-diary').value.trim();
    if(diary){S.set('write_'+this.date,diary);_push('write_'+this.date,diary);}
    var g1=document.getElementById('td-g1').value.trim();
    var g2=document.getElementById('td-g2').value.trim();
    var g3=document.getElementById('td-g3').value.trim();
    if(g1||g2||g3){S.set('grat_'+this.date,[g1,g2,g3]);_push('grat_'+this.date,[g1,g2,g3]);}
    T('已保存');
    this.renderDateLabel();
  },

  // ── Awakening ──
  _awIdx:0,

  loadAwakening:function(){
    var seed=parseInt(this.date.replace(/-/g,''))%AWAKENINGS.length;
    this._awIdx=Math.abs(seed);
    this.renderAwakening();
  },

  renderAwakening:function(){
    var a=AWAKENINGS[this._awIdx%AWAKENINGS.length];
    document.getElementById('td-aw-quote').textContent='"'+a.quote+'"';
    document.getElementById('td-aw-content').textContent=a.content;
    document.getElementById('td-aw-source').textContent='—— '+a.source;
  },

  nextAwakening:function(){
    this._awIdx=(this._awIdx+1)%AWAKENINGS.length;
    this.renderAwakening();
  },

  // ── Export ──
  exportDay:function(){
    var lines=[];
    lines.push('━━━━━━━━━━━━━━━━━━');
    lines.push('  心灵驿站 · 记录');
    lines.push('━━━━━━━━━━━━━━━━━━');
    var d=new Date(this.date+'T00:00:00');
    lines.push(d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日');
    var moods=S.get('moods',[]);var self=this;
    var todayMood=null;
    moods.forEach(function(m){if(m.time&&m.time.slice(0,10)===self.date)todayMood=m;});
    if(todayMood){
      var labels={1:'😢 难过',2:'😕 低落',3:'😐 平静',4:'😀 开心',5:'😊 幸福'};
      lines.push('心情：'+labels[todayMood.level]);
    }
    lines.push('');
    var diary=S.get('write_'+this.date,'');
    if(diary)lines.push(diary);
    lines.push('');
    var g=S.get('grat_'+this.date,['','','']);
    if(g.join('')){
      lines.push('🙏 感恩：');
      if(g[0])lines.push('1. '+g[0]);
      if(g[1])lines.push('2. '+g[1]);
      if(g[2])lines.push('3. '+g[2]);
    }
    lines.push('━━━━━━━━━━━━━━━━━━');
        var blob=new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'});
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='xinling_'+this.date+'.txt';a.click();
    T('导出完成');
  },

  // ── Mood chart ──
  drawChart:function(){
    var moods=S.get('moods',[]);
    var svg=document.getElementById('td-chart');if(!svg)return;
    if(!moods.length){svg.innerHTML='';return;}
    var days=[],now=new Date();
    for(var i=13;i>=0;i--){var d=new Date(now);d.setDate(d.getDate()-i);days.push(d.toISOString().slice(0,10));}
    var points=[];
    days.forEach(function(day){
      var found=null;
      moods.forEach(function(m){if(m.time&&m.time.slice(0,10)===day)found=m.level;});
      points.push(found);
    });
    var w=400,h=140,pad=30,html='';
    for(var l=1;l<=5;l++){var y=pad+(h-pad*2)*(1-l/5);html+='<line x1="'+pad+'" y1="'+y+'" x2="'+(w-pad)+'" y2="'+y+'" stroke="var(--bdl)" stroke-width="0.5"/>';}
    days.forEach(function(day,i){
      if(i%2===0){var x=pad+(w-pad*2)*i/(days.length-1),d2=new Date(day+'T00:00:00');html+='<text x="'+x+'" y="'+(h-4)+'" text-anchor="middle" font-size="9" fill="var(--tmuted)">'+(d2.getMonth()+1)+'/'+d2.getDate()+'</text>';}
    });
    var linePoints='';
    points.forEach(function(p,i){
      if(p!==null){var x=pad+(w-pad*2)*i/(points.length-1),y=pad+(h-pad*2)*(1-p/5);linePoints+=(linePoints?' ':'')+x+','+y;}
    });
    if(linePoints)html+='<polyline points="'+linePoints+'" fill="none" stroke="var(--green)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>';
    points.forEach(function(p,i){
      if(p!==null){var x=pad+(w-pad*2)*i/(points.length-1),y=pad+(h-pad*2)*(1-p/5);html+='<circle cx="'+x+'" cy="'+y+'" r="4" fill="var(--green)"/><circle cx="'+x+'" cy="'+y+'" r="2" fill="#fff"/>';}
    });
    svg.innerHTML=html;
  }
};

var G2={

  switchSub:function(s){
    this.sub=s;
    document.getElementById('g-books').style.display=s==='books'?'block':'none';
    document.getElementById('g-skills').style.display=s==='skills'?'block':'none';
    document.getElementById('g-zen').style.display=s==='zen'?'block':'none';
    ['gs-books','gs-skills','gs-zen'].forEach(function(id,i){
      var el=document.getElementById(id),types=['books','skills','zen'];
      if(types[i]===s)el.classList.add('active');else el.classList.remove('active');
    });
    if(s==='books')this.renderBooks();
    if(s==='skills')this.initSkills();
    if(s==='zen')this.showZen();
  },
  // Books
  addBook:function(){
    var title=document.getElementById('book-title').value.trim();
    if(!title){T('请输入书名');return}
    var author=document.getElementById('book-author').value.trim();
    var status=document.getElementById('book-status').value;
    var progress=document.getElementById('book-progress').value.trim();
    var note=document.getElementById('book-note').value.trim();
    var books=S.get('books',[]);
    var book={title:title,author:author,status:status,progress:progress,note:note,added:new Date().toISOString()};
    var self=this;
    if(this.curBookId!==null){
      var old=books[this.curBookId];
      book.added=old.added;
      if(old.id)book.id=old.id;
      books[this.curBookId]=book;this.curBookId=null;
      S.set('books',books);this.clearBookForm();this.renderBooks();T('书籍已保存 📖');
      if(book.supabase_id){(async function(){var uid=await _getUid();if(uid)await sb.from('books').update({title:title,author:author,status:status,progress:progress,note:note}).eq('id',book.supabase_id)})()}
    }else{
      books.push(book);
      S.set('books',books);this.clearBookForm();this.renderBooks();T('书籍已保存 📖');
      (async function(){var uid=await _getUid();if(uid){var r=await sb.from('books').insert([{user_id:uid,title:title,author:author,status:status,progress:progress,note:note,added:book.added}]).select('id').single();
        if(r.data){book.supabase_id=r.data.id;book.id=r.data.id;S.set('books',books)}}})()
    }
  },
  clearBookForm:function(){
    this.curBookId=null;
    document.getElementById('book-title').value='';document.getElementById('book-author').value='';
    document.getElementById('book-status').value='want';document.getElementById('book-progress').value='';
    document.getElementById('book-note').value='';
  },
  editBook:function(i){
    var b=S.get('books',[])[i];if(!b)return;this.curBookId=i;
    document.getElementById('book-title').value=b.title;document.getElementById('book-author').value=b.author||'';
    document.getElementById('book-status').value=b.status||'want';document.getElementById('book-progress').value=b.progress||'';
    document.getElementById('book-note').value=b.note||'';
    window.scrollTo(0,0);
  },
  deleteBook:function(i){
    if(!confirm('确定删除这本书吗？'))return;
    var books=S.get('books',[]);
    var removed=books[i];
    if(removed&&removed.supabase_id){(async function(){var uid=await _getUid();if(uid)await sb.from('books').delete().eq('id',removed.supabase_id)})()}
    books.splice(i,1);S.set('books',books);
    if(this.curBookId===i)this.clearBookForm();
    this.renderBooks();T('已删除');
  },
  renderBooks:function(){
    var books=S.get('books',[]);
    var statusLabels={want:'📋 想读',reading:'📖 在读',done:'✅ 已读'};
    var statusColors={want:'var(--tmuted)',reading:'var(--blue)',done:'var(--green)'};
    var h='';
    if(!books.length)h='<div style="text-align:center;color:var(--tmuted);padding:24px">📭 书架空空，添加第一本书吧～</div>';
    else books.forEach(function(b,i){
      var sc=statusColors[b.status]||statusColors.want,sl=statusLabels[b.status]||statusLabels.want;
      h+='<div class="book-card">';
      h+='<div style="display:flex;justify-content:space-between;align-items:flex-start">';
      h+='<div style="flex:1"><div style="font-weight:700;font-size:15px;color:var(--dbrown)">📖 '+b.title+'</div>';
      if(b.author)h+='<div style="font-size:12px;color:var(--tlight);margin-top:2px">✍ '+b.author+'</div>';
      h+='<div style="margin-top:4px"><span class="bc-status" style="background:'+sc+'15;color:'+sc+'">'+sl+'</span>';
      if(b.progress)h+=' <span style="font-size:11px;color:var(--tlight)">'+b.progress+'</span>';
      h+='</div>';
      if(b.note)h+='<div style="font-size:12px;color:var(--text);margin-top:6px;padding:8px;background:rgba(255,255,255,.5);border-radius:8px;line-height:1.6">💬 '+b.note+'</div>';
      h+='</div>';
      h+='<div style="display:flex;flex-direction:column;gap:4px;margin-left:8px">';
      h+='<button class="btn btn-o btn-s" style="font-size:10px;padding:4px 8px" onclick="G2.editBook('+i+')">✏</button>';
      h+='<button class="btn btn-d" onclick="G2.deleteBook('+i+')">✕</button>';
      h+='</div></div></div>';
    });
    if(books.length){
      var want=books.filter(function(b){return b.status==='want'}).length;
      var reading=books.filter(function(b){return b.status==='reading'}).length;
      var done=books.filter(function(b){return b.status==='done'}).length;
      h+='<div style="display:flex;gap:8px;justify-content:center;margin-top:8px;font-size:11px;color:var(--tlight)">';
      h+='<span>📋 想读 '+want+'</span><span>📖 在读 '+reading+'</span><span>✅ 已读 '+done+'</span><span>📚 共 '+books.length+' 本</span></div>';
    }
    document.getElementById('book-list').innerHTML=h;
  },
  // Skills
  skillsInit:false,
  initSkills:function(){
    if(this.skillsInit)return;this.skillsInit=true;
    var self=this,h='';
    this.skills.forEach(function(s,i){h+='<div class="list-item'+(i===0?' sel':'')+'" onclick="G2.showSkill('+i+')"><div style="font-weight:600">'+s.name+'</div><div style="font-size:11px;color:var(--tlight)">'+s.summary+'</div></div>'});
    document.getElementById('skills-list').innerHTML=h;this.showSkill(0);
  },
  showSkill:function(i){
    document.querySelectorAll('#skills-list .list-item').forEach(function(el,j){el.classList.toggle('sel',j===i)});
    var s=this.skills[i];
    document.getElementById('sdetail').textContent='【'+s.name+'】'+s.summary+'\n\n'+'─'.repeat(20)+'\n\n'+s.detail;
  },
  // Zen
  showZen:function(){
    var s=this.zenStories[this.zenIdx];
    document.getElementById('zemoji').textContent=s.emoji;
    document.getElementById('ztitle').textContent='📖 '+s.title;
    document.getElementById('zcontent').textContent=s.content;
  },
  zenPrev:function(){this.zenIdx=(this.zenIdx-1+this.zenStories.length)%this.zenStories.length;this.showZen()},
  zenNext:function(){this.zenIdx=(this.zenIdx+1)%this.zenStories.length;this.showZen()},
  zenRandom:function(){this.zenIdx=Math.floor(Math.random()*this.zenStories.length);this.showZen()}
};

      see:{text:'愤怒像一个忠诚但冲动的卫士。它在保护什么？\n\n通常愤怒的下面，藏着更深的情感：\n• 可能是受伤——有人说了什么让你感到被否定\n• 可能是恐惧——你对某种结果感到害怕\n• 可能是无力感——你想改变却改变不了\n• 可能是委屈——你付出了很多却没有被看见\n\n愤怒是冰山的一角，下面是什么？',follow:['感到受伤','觉得不公平','很无力','被忽视了']},
      accept:{text:'允许自己愤怒，不代表你要被愤怒控制。\n\n试着做一个练习：把愤怒想象成一股红色的能量，它在你体内流动。不要压抑它，也不要被它带走。只是观察它。\n\n你可以对愤怒说："我看到你了。你是我的一部分。你有权利存在。但你不是我的主人。"\n\n这股能量，可以被转化为力量——保护自己的力量、设立边界的力量、改变现状的力量。',follow:['我试试','这很难但还是想试试','继续说']},
      heal:{text:'将愤怒转化为力量，可以试试这些：\n\n🌿 1. 写下所有让你生气的事，不加评判地写。写完后，问自己："这里面有哪些是我能改变的？哪些是我需要接受的？"\n\n🌿 2. 用运动来释放——快走、跑步、甚至只是用力跺脚——让身体的能量流动起来。\n\n🌿 3. 练习"暂停"：在愤怒要爆发的瞬间，给自己6秒钟的暂停。这6秒可以改变一切。\n\n你值得被尊重，你的感受值得被倾听。🕊',follow:['谢谢，有帮助','我想写下来','还想聊聊']}
    },
    confusion:{
      awake:{text:'迷茫是一种"在路上的感觉"。它不是你走错了路，而是你正在走到一条新路的开始。\n\n很多人在人生的重要转折点都会感到迷茫——这是成长的前兆，不是退步。\n\n能和我分享一下，这种迷茫主要体现在哪个方面吗？',follow:['工作/事业','人际关系','人生方向','自我价值','说不清楚']},
      see:{text:'迷茫常常是因为我们在用"旧的自己"面对"新的情况"。\n\n旧的思维方式、旧的价值观、旧的期待，已经不太适用了，但新的还没建立起来。这个过渡期就是迷茫的来源。\n\n这不是你的错。这是成长的必经阶段。就像蛇蜕皮、蝴蝶破茧——它们都要经历一段"看不清"的时期。',follow:['这让我感觉好一点','但还是不知道怎么办','继续']},
      accept:{text:'我想邀请你做一个练习：\n\n闭上眼睛，想象你站在一片大雾中。看不到前方的路，这很正常。\n\n但大雾并不会永远持续。太阳会出来。\n\n现在，不必急着找方向。只是站着，感受脚下的土地。你的脚是稳的。你此刻是安全的。\n\n"我不需要马上知道答案。我可以给自己时间。迷茫是我正在成长的证据。"',follow:['我觉得平静了一些','还是很迷茫','继续下一步']},
      heal:{text:'在迷雾中，不需要看清整条路，只需要看到下一步。\n\n🌿 1. 问自己："如果我知道我不会失败，我会做什么？"——这个问题能帮你听见内心的声音，而不是恐惧的声音。\n\n🌿 2. 做一个小小的尝试：选一个你感兴趣的方向，只是"试试看"，不承诺、不期待结果。行动本身会带来清晰。\n\n🌿 3. 找信任的人聊一聊——有时候迷茫是因为我们困在了自己的思维里。\n\n记住：船的舵不是为了避开所有风浪，而是为了在风浪中保持方向。🕊',follow:['谢谢，我想试试','有帮助','想去行动了']}
    },
    exhaustion:{
      awake:{text:'你辛苦了。真的辛苦了。\n\n疲惫不只是身体的感受，也是心灵在说："我需要休息，我需要被照顾。"\n\n在这个永远在催促你"更快、更多、更好"的世界里，感到疲惫是一种诚实的反应。它不是你的失败，而是你的人性。\n\n请你现在，如果可以，做一件最简单的事：深呼吸三次。只是三次。',follow:['真的太累了','身体和心理都累','想休息却停不下来']},
      see:{text:'倦怠（Burnout）通常有三个层面：\n• 身体层面：睡眠不足、饮食不规律、缺乏运动\n• 情感层面：付出太多却得不到回馈、不被认可\n• 意义层面：做的事与内心的价值观渐行渐远\n\n你的疲惫最主要是哪个层面的？\n\n看见疲惫的来源，不是为了责怪自己，而是为了更好地照顾自己。',follow:['身体透支','情感枯竭','找不到意义','全都有']},
      accept:{text:'我想对你说一段话，你可以慢慢读：\n\n"你不需要永远坚强。\n你不需要让所有人都满意。\n你的价值不等于你的产出。\n你存在的本身就是有价值的。\n你是人，不是机器。\n会累，说明你活着。\n会痛，说明你在乎。\n现在，给自己停下来的允许。\n这不是放弃，这是自爱。"\n\n把手放在心口。感受自己的心跳。你值得休息。',follow:['这段话让我想哭','我感觉被理解了','谢谢']},
      heal:{text:'疗愈"倦怠"不是"做更多"，而是"做更少但更真"。\n\n🌿 1. 今天，做一件"没有用但让你开心"的事——看一朵花、听一首歌、晒晒太阳。不是为了任何目的，只是为了你。\n\n🌿 2. 设立一个小小的边界：今天对一件不必要的事说"不"。每一个"不"，都是对自己的一次"是"。\n\n🌿 3. 做一个能量日记：记录什么事消耗你的能量，什么事让你恢复能量。一周之后，你会找到自己的能量密码。\n\n你不是倦怠了，你只是需要被重新点燃。🕊',follow:['谢谢','我想试试能量日记','感觉好多了']}
    },
    loneliness:{
      awake:{text:'孤独感是一种特别的感受——即使在人群中也可能感到孤独。这说明它不是你身边有没有人的问题，而是你的内心渴望一种更深层的"被理解"。\n\n我想告诉你：\n• 感到孤独是非常普遍的人类体验\n• 它不代表你不可爱、不值得\n• 它只是说明你渴望真正的连接\n\n此刻，你愿意和我聊聊这种孤独感吗？',follow:['身边没人理解我','与人疏离了','一直都感到孤独','最近才开始的']},
      see:{text:'孤独有两种：\n• 社交孤独：缺少足够的社交联系\n• 情感孤独：缺少深度的情感连接——被真正理解和看见的体验\n\n你更多感受到的是哪一种？\n\n其实，我们每个人都渴望被另一个人"真正看见"。不是表面的社交，而是深度的共鸣。这种渴望，是你内心丰富和敏感的标志。',follow:['缺少深度连接','两者都有','不知道怎么表达']},
      accept:{text:'孤独的感觉，某种程度上，是你与自己对话的机会。\n\n试着做一个练习：把孤独想象成一位安静的访客。它坐在你身边，不说话，但也不可怕。\n\n你可以对它说："我知道你在这里。你是我的一部分。我不急着赶你走，但我要学会和你相处。"\n\n一个人独处的能力，是心理健康最重要的标志之一。当你学会与自己相处，孤独就不再是敌人，而是老师。',follow:['这让我感觉不同了','想试试和自己相处','继续']},
      heal:{text:'从孤独到连接，有一些小小的桥：\n\n🌿 1. 练习"深度连接"：下一次与人交谈时，试着分享一个真实的感受，而不是只聊天气。脆弱是连接的开始。\n\n🌿 2. 给自己写一封信，就像写给一个最好的朋友。你会发现，你比想象中更懂得安慰自己。\n\n🌿 3. 加入一个与你兴趣相关的社群——读书、绘画、爬山、志愿活动……共同的热爱是连接的自然土壤。\n\n记住：感到孤独，说明你渴望着更真实的关系。这份渴望，会引领你找到属于自己的联结。🕊',follow:['谢谢，我想试试','有帮助','想去行动了']}
    },
    guilt:{
      awake:{text:'自责和愧疚，说明你是一个有良知、有责任感的人。\n\n但请区分两件事：\n• 健康的愧疚感：帮你修正行为，变成更好的人\n• 过度自责：不断攻击自己，让你无法前进\n\n你现在的感受，更像是哪一种？\n\n对自己温柔一点。你已经在尽力了。',follow:['我做了不好的事','总觉得自己不够好','对某些人感到亏欠','一直在自我批评']},
      see:{text:'过度自责往往来自于：\n• 小时候被要求"完美"的经验\n• 内在有一个严厉的"批判者"\n• 把不属于自己的责任也背起来了\n\n让我们来区分：\n• 你的责任是什么？\n• 不是你的责任是什么？\n• 你无法控制的是什么？\n\n把不属于你的放下来。那不是你的重量。',follow:['我背负太多了','分不清楚','对自己太苛刻了']},
      accept:{text:'现在，我想邀请你做"自我慈悲"练习：\n\n想象你最好的朋友犯了同样的错，你会对他说什么？你会骂他、打击他吗？还是你会理解他、鼓励他？\n\n——为什么你可以对朋友那么好，却对自己那么苛刻？\n\n请对自己说：\n"我做了我能做的，\n犯错是人的一部分，\n我可以在错误中学习，\n而不是在错误中毁灭自己。\n我原谅我自己。"',follow:['这好难但我试试','我从来没有这样想过','哭了']},
      heal:{text:'从自责中走出来的路，叫做"自我怜悯"：\n\n🌿 1. 写一封"原谅信"给自己。承认你犯的错，也承认你从中得到的成长。然后把信收好。\n\n🌿 2. 做一个小小的"弥补"：如果可以，用行动来修复。如果不能修复，就把这次的经验变成帮助别人的礼物。\n\n🌿 3. 每天早上对着镜子说："我是有价值的。我正在成长。我今天可以对自己好一点。"\n\n愧疚感是你的老师，不是你的监狱。学完功课，就可以离开了。🕊',follow:['谢谢，我想写那封信','我学会了','感觉轻松一些了']}
    },
    fear:{
      awake:{text:'恐惧是最原始的保护机制——它在数百万年的进化中保护了我们的祖先。所以当你感到恐惧时，你不是"胆小"，你只是在体验人类最基本的情感之一。\n\n恐惧说："小心，可能有危险。"\n\n但它有时候会把"可能"当成"一定"。\n\n来，先深呼吸。你此刻是安全的。你正在读这些文字。你的脚踩在地上。\n\n你愿意告诉我，这种不安是关于什么的吗？',follow:['未来不确定','害怕失败','担心他人看法','健康/安全问题','说不清的恐惧']},
      see:{text:'恐惧和兴奋，在身体里的感受几乎一模一样——心跳加快、呼吸变浅、肌肉紧张。它们的区别只在于大脑如何解读。\n\n有时候，我们害怕的不是事实，而是想象。大脑会把"可能会发生"的画面变得非常真实。\n\n等一下，区分这两件事很重要：\n• 此刻真实存在的危险是什么？\n• 你脑海中想象的坏结果是什么？\n\n通常，我们90%的恐惧从未成真。',follow:['确实很多是想象的','但还是控制不住','我明白了']},
      accept:{text:'和恐惧对抗，只会让恐惧更强大。\n\n试着做一个练习：欢迎恐惧。对它说：\n\n"我看到你了，恐惧。\n你是来保护我的，谢谢你的好意。\n但这一次，我要告诉你：\n我看到了危险的可能性，\n但我选择不被你掌控。\n我是害怕的，但我也是勇敢的。\n因为勇敢不是不害怕，\n而是害怕的时候依然前行。"\n\n你比你的恐惧大得多。',follow:['这段话很有力量','我需要多读几遍','继续']},
      heal:{text:'面对恐惧，试试这些方法：\n\n🌿 1. "所以呢？"练习：写下你最怕发生的事，然后问自己："如果这件事真的发生了，所以呢？然后会发生什么？我还能做什么？"——通常你会发现，即使最坏的情况，你也能应对。\n\n🌿 2. 小步前进：不要想着一步跨越恐惧，只是每天做一件让自己稍微"不舒服"的小事。勇气像肌肉，越练越强。\n\n🌿 3. 做一个"安全锚"：找到一件让你感到安全和温暖的物品或回忆，每次恐惧来袭时，打开这个"锚"，让自己回到安全感中。\n\n恐惧是门，穿过它，你会找到全新的自己。🕊',follow:['谢谢，我想试试','我感觉更有力量了','还想聊聊别的']}
    }
  },
  exercises:[
    {num:1,title:'5-4-3-2-1 感官锚定',desc:'一种有效的 grounding 技术，帮你从焦虑中回到当下。',detail:'找一个安静的地方，深呼吸一次。\n\n👁 看：找到 5 个你能看到的东西。仔细地看它们，注意颜色、形状、纹理。\n\n✋ 触：找到 4 个你能触碰的东西。感受它们的质地——粗糙、光滑、温暖、凉爽。\n\n👂 听：听出 3 个你能听到的声音。近处的、远处的、细微的。\n\n👃 闻：嗅到 2 种你能闻到的气味。空气的味道、衣服的味道。\n\n👅 尝：感受 1 种你能尝到的味道。口腔里的味道、嘴唇的感觉。\n\n——现在，你回到了当下。深呼吸。'},
    {num:2,title:'内在小孩对话',desc:'与内心深处那个受伤的自己对话，给予他/她需要的爱。',detail:'闭上眼睛，深呼吸三次。\n\n想象你面前有一个小孩——那是小时候的你。\n\n看看他/她的眼睛。他/她在经历什么？他/她需要什么？\n\n现在，作为成年的你，走过去，蹲下来，平视着他/她。\n\n对他/她说：\n"我看到了你。\n我听到你了。\n你是值得被爱的。\n你不用完美。\n我会保护你。\n我就是你未来的样子，\n谢谢你坚持了这么久。"\n\n给他/她一个拥抱。感受这个拥抱。\n\n这是你给自己的，迟到的礼物。'},
    {num:3,title:'自我慈悲休息',desc:'来自正念自我慈悲（MSC）的练习，给自己三分钟的温柔。',detail:'找一个舒服的姿势。闭上眼睛。\n\n第一分钟：觉察\n在心里对自己说：\n"我现在感受到的是______ (命名你的情绪)\n这是我此刻真实的体验。\n我不是一个人。\n世界上很多人也在经历类似的感受。"\n\n第二分钟：共通人性\n"痛苦是人类的共同体验。\n我此刻的挣扎，恰恰证明我是一个有血有肉的人。\n我不孤单。"\n\n第三分钟：自我善意\n把手放在心口。对自己说：\n"愿我对自己温柔。\n愿我接纳自己。\n愿我给自己需要的善意。\n愿我平安。"\n\n慢慢睁开眼睛。感受这份善意。\n\n你可以将这三分钟的练习，作为每天送给自己的一份礼物。'},
    {num:4,title:'情绪河流冥想',desc:'学习让情绪流动，而不是被情绪困住。',detail:'闭上眼睛，想象自己坐在一条河流的岸边。\n\n水面上飘着各种叶子，每片叶子上写着一个你的想法或情绪。\n\n有的叶子写着"焦虑"，有的写着"担心"，有的写着"烦躁"...\n\n你不需要跳进河里抓住某片叶子。\n你只是坐在岸边，看着它们飘过。\n\n它们来了，又走了。\n\n来的时候说："哦，焦虑来了。"\n走的时候说："它走了。"\n\n你不等于你的想法。\n你不等于你的情绪。\n你是那个静静观察的岸边的人。\n\n——任何时候感到被情绪淹没，就回到这个岸边。'},
    {num:5,title:'身体扫描疗愈',desc:'从头顶到脚尖，系统性地放松身体的每一个部位。',detail:'躺下或舒服地坐着。闭上眼睛。\n\n把注意力带到你的：\n• 头顶和头皮——感受这里，然后放松\n• 额头和眉毛——松开皱眉的肌肉\n• 眼睛和眼眶——让眼球沉入眼窝\n• 下巴和舌头——松开牙关，让舌头放松\n• 脖子和肩膀——把肩膀放下，远离耳朵\n• 胸口和心脏——感受心跳，对它微笑\n• 腹部——感受呼吸的起伏\n• 背部——让脊柱沉入支撑面\n• 手臂和手掌——感受手掌的温度\n• 大腿、小腿、脚掌——感受脚掌与地面的接触\n\n现在，感受整个身体的放松。\n你在这里。你回家了。'},
    {num:6,title:'感恩身体练习',desc:'重新建立与身体的连接，感谢它为你承担的一切。',detail:'站起来或坐直。深呼吸。\n\n把你的手放在身体的不同部位，并对它们表示感谢：\n\n• 双手放在头上："谢谢你，我的大脑。即使你很累，也一直在工作。"\n\n• 手放在肩膀上："谢谢你，我的肩膀。你帮我扛了那么多。"\n\n• 手放在胸口："谢谢你，我的心脏。你从来没有停止过跳动。"\n\n• 手放在肚子上："谢谢你，我的呼吸。你从未离开我。"\n\n• 手放在脚上："谢谢你，我的脚。你带着我走过每一步。"\n\n你的身体是你最忠诚的朋友。它值得你的感谢和关怀。'},
    {num:7,title:'三种自我状态觉察',desc:'来自《蛤蟆先生去看心理医生》——识别你此刻处于哪种自我状态。',detail:'根据沟通分析（TA）理论，每个人都有三种自我状态：\n\n👶 儿童自我（Child Ego State）\n• 你当下的感受和行为像小时候的自己\n• 包括：顺从的儿童、叛逆的儿童、自由的儿童\n• 信号：情绪化、依赖、讨好、或任性冲动\n\n👨‍🏫 父母自我（Parent Ego State）\n• 你在重复父母或权威人物的言行\n• 包括：批判的父母、养育的父母\n• 信号：说教、指责、应该/不应该、过度保护\n\n🧠 成人自我（Adult Ego State）\n• 你基于当下事实、理性地思考和行动\n• 信号：冷静、客观、灵活、解决问题\n\n现在，问自己：\n• 刚才我处于哪种状态？\n• 谁在说话——内在的小孩、父母、还是成人？\n• 如果切换到"成人自我"，我会怎么看这件事？'},
    {num:8,title:'课题分离练习',desc:'来自《被讨厌的勇气》——学会把别人的课题还回去。',detail:'阿德勒心理学中有一个核心概念：课题分离。\n\n🔑 判断标准：这件事的最终后果由谁来承担？\n\n练习步骤：\n\n1. 写下困扰你的人际关系问题（一件具体的事）\n2. 问自己：这件事的最终后果由谁承担？\n\n如果是你承担——这是你的课题，你需要面对\n如果是别人承担——这是别人的课题，你无需干涉\n如果是老天的事——随它去\n\n3. 写下你一直在替别人承担的东西：\n• _________（比如：父母的期待、朋友的评价）\n\n4. 说出这句咒语：\n"这是你的课题，我尊重你的选择。\n这是我的课题，我为自己负责。"\n\n课题分离不是冷漠，而是让别人做别人，让自己做自己。'},
    {num:9,title:'人生坐标检视',desc:'来自《蛤蟆先生去看心理医生》——你站在哪个位置看自己和世界？',detail:'人生坐标（Life Positions）有四种：\n\n1. 我好，你也好 ✅（健康状态）\n→ 我相信自己的价值，也相信别人的善意\n→ 合作、信任、共同成长\n\n2. 我好，你不好 ⚠️\n→ 我永远是对的，错的是别人\n→ 指责、抱怨、优越感\n\n3. 我不好，你好 😔\n→ 我总是不够好，别人都比我强\n→ 自卑、讨好、委屈、抑郁症易感\n\n4. 我不好，你也不好 💔\n→ 世界是灰暗的，一切都没有意义\n→ 绝望、冷漠、疏离\n\n练习：\n• 最近你在用哪个坐标看待自己和他人？\n• 你童年形成的基本坐标是哪一种？\n• 如果你主动选择"我好，你也好"，你今天的什么决定会不同？\n\n改变人生，从改变坐标开始。'},
    {num:10,title:'非暴力沟通四步法',desc:'来自《非暴力沟通》——在不伤害关系的前提下表达真实需求。',detail:'NVC（非暴力沟通）四要素：\n\n1️⃣ 观察（不评判）\n"当我看到/听到_________"\n→ 只说事实，不加"你总是""你从来"这样的评判\n\n2️⃣ 感受（不压抑）\n"我感到_________"\n→ 命名你的情绪：难过、失望、担心、委屈...\n→ 不要用"我觉得你..."（那是指责不是感受）\n\n3️⃣ 需要（不回避）\n"因为我需要_________"\n→ 找到感受背后的需要：尊重、理解、安全、自主...\n→ 情绪是指向需要的路标\n\n4️⃣ 请求（不命令）\n"你愿意_________吗？"\n→ 具体、可行、给对方选择权\n→ 请求不是要求，接纳"不"的答案\n\n练习：想一个最近的冲突，试着用四步法重新表达。你会发现，同样是说话，爱的语言和暴力的语言，效果完全不同。'}

  nextStep:function(){
    var steps=['awake','see','accept','heal'];

    var step=steps[this.chatStep],r=this.responses[this.chatEmotion];
    this.showStep(step);
  },
  showStep:function(step){
    var self=this,r=this.responses[this.chatEmotion];
    if(!r)return;
    var data=r[step];if(!data)return;
    var labels={awake:'觉察',see:'看见',accept:'接纳',heal:'疗愈'};
    var classes={awake:'awake',see:'see',accept:'accept',heal:'heal'};
    var html='<span class="chat-step '+classes[step]+'">'+labels[step]+'</span><br>'+data.text.replace(/\n/g,'<br>');
    this.addChatBubble('agent',html);
    // actions
    var ah='';
    if(data.follow&&self.chatStep<3){
      data.follow.forEach(function(f,i){
        ah+='<button class="btn btn-o btn-s" onclick="H2.onFollow('+self.chatStep+','+i+')">'+f+'</button>';
      });
    }
    document.getElementById('chat-actions').innerHTML=ah;
    // auto scroll
    var ca=document.getElementById('chat-area');ca.scrollTop=ca.scrollHeight;
    self.chatStep=(['awake','see','accept','heal'].indexOf(step))+1;
  },
  onFollow:function(stepIdx,choiceIdx){
    var steps=['awake','see','accept','heal'],step=steps[stepIdx];
    var r=this.responses[this.chatEmotion];
    var choice=r[step].follow[choiceIdx];
    this.addChatBubble('user',choice);
    document.getElementById('chat-actions').innerHTML='';
    var self=this;
    setTimeout(function(){self.nextStep()},500);

// ═══════════════ PROFILE ═══════════════
var P2={
  render:function(){
    // stats
    var moods=S.get('moods',[]),books=S.get('books',[]);
    var moodDays={};moods.forEach(function(r){moodDays[r.time.slice(0,10)]=1});
    var journalDays={};
    for(var i=0;i<localStorage.length;i++){
      var k=localStorage.key(i);
      if(k.startsWith('mh_grat_20')){var c=S.get(k.replace('mh_',''),['','','']);if(c.some(function(x){return x.trim()}))journalDays[k.replace('mh_grat_','')]=1}
      if(k.startsWith('mh_write_20')&&S.get(k.replace('mh_',''),'').trim())journalDays[k.replace('mh_write_','')]=1
    }
    var totalMoods=moods.length,totalJournal=Object.keys(journalDays).length,totalMoodDays=Object.keys(moodDays).length;
    var reading=books.filter(function(b){return b.status==='reading'}).length;
    var done=books.filter(function(b){return b.status==='done'}).length;

    document.getElementById('stat-grid').innerHTML=
      '<div class="stat-item"><div class="sv">'+totalMoods+'</div><div class="sl">心情记录</div></div>'+
      '<div class="stat-item"><div class="sv">'+totalJournal+'</div><div class="sl">日记天数</div></div>'+
      '<div class="stat-item"><div class="sv">'+done+'</div><div class="sl">已读书籍</div></div>'+
      '<div class="stat-item"><div class="sv">'+reading+'</div><div class="sl">在读</div></div>';

    // achievements
    var ach=[];
    if(totalMoods>=1)ach.push({icon:'🌱',label:'初次记录',earned:true});
    if(totalMoods>=7)ach.push({icon:'🌿',label:'持续一周',earned:true});
    if(totalMoods>=30)ach.push({icon:'🌳',label:'月度达人',earned:true});
    if(totalMoods>=100)ach.push({icon:'🏆',label:'百次记录',earned:true});
    if(done>=1)ach.push({icon:'📖',label:'读完首书',earned:true});
    if(done>=5)ach.push({icon:'📚',label:'小书虫',earned:true});
    if(done>=20)ach.push({icon:'🎓',label:'博学者',earned:true});
    if(totalJournal>=14)ach.push({icon:'✍',label:'日记达人',earned:true});
    var ah='';ach.forEach(function(a){
      ah+='<div class="achieve-badge'+(a.earned?' earned':'')+'"><span class="ab-icon">'+a.icon+'</span>'+a.label+'</div>';
    });
    document.getElementById('achievements').innerHTML=ah;

    // mood chart
    this.renderProfileChart();
  },
  renderProfileChart:function(){
    var svg=document.getElementById('pchart'),recs=S.get('moods',[]);
    var days=[];for(var i=29;i>=0;i--){var d=new Date();d.setDate(d.getDate()-i);days.push(d.toISOString().slice(0,10))}
    var daily={};recs.forEach(function(r){var d=r.time.slice(0,10);if(!daily[d])daily[d]=[];daily[d].push(r.level)});
    var avgs=days.map(function(d){if(!daily[d]||!daily[d].length)return null;return daily[d].reduce(function(a,b){return a+b},0)/daily[d].length});
    var h='',l=30,r=380,t=20,b=130,valid=avgs.filter(function(v){return v!==null});
    for(var i=1;i<=5;i++){var y=b-(i*(b-t)/5);h+='<line x1="'+l+'" y1="'+y+'" x2="'+r+'" y2="'+y+'" stroke="var(--bdl)" stroke-dasharray="2,3"/><text x="'+(l-6)+'" y="'+(y+4)+'" text-anchor="end" font-size="8" fill="var(--tmuted)">'+(6-i)+'</text>';}
    var pts=[],step=(r-l)/29;
    avgs.forEach(function(v,i){if(v===null)return;var x=l+i*step,y=b-(v-1)*(b-t)/4;pts.push({x:x,y:y});h+='<circle cx="'+x+'" cy="'+y+'" r="3" fill="var(--green)" opacity=".7"/>';});
    for(var j=1;j<pts.length;j++)h+='<line x1="'+pts[j-1].x+'" y1="'+pts[j-1].y+'" x2="'+pts[j].x+'" y2="'+pts[j].y+'" stroke="var(--green)" stroke-width="1.5" opacity=".5"/>';
    if(!pts.length)h='<text x="200" y="70" text-anchor="middle" font-size="13" fill="var(--tmuted)">开始记录心情，这里会显示趋势</text>';
    svg.innerHTML=h;
  },
  setFont:function(f){
    S.set('pref_font',f);
    if(f==='serif')document.body.classList.add('font-serif');
    else document.body.classList.remove('font-serif');
    document.querySelectorAll('.font-opt').forEach(function(b){b.classList.remove('active')});
    document.querySelector('.font-opt[data-font="'+f+'"]').classList.add('active');
  },
  setSize:function(s){
    S.set('pref_size',s);
    document.body.classList.remove('size-s','size-l');
    if(s==='s')document.body.classList.add('size-s');
    if(s==='l')document.body.classList.add('size-l');
    document.querySelectorAll('.size-opt').forEach(function(b){b.classList.remove('active')});
    document.querySelector('.size-opt[data-size="'+s+'"]').classList.add('active');
  },
  initAppearance:function(){
    var f=S.get('pref_font','default'),s=S.get('pref_size','m');
    if(f==='serif')document.body.classList.add('font-serif');
    if(s==='s')document.body.classList.add('size-s');
    if(s==='l')document.body.classList.add('size-l');
    var fa=document.querySelector('.font-opt[data-font="'+f+'"]');
    if(fa)fa.classList.add('active');
    var sa=document.querySelector('.size-opt[data-size="'+s+'"]');
    if(sa)sa.classList.add('active');
  },
  exportAll:function(){
    // Collect all data
    var start=prompt('开始日期（如 2026-01-01）：','2026-01-01');
    if(!start)return;
    var end=prompt('结束日期（如 2026-05-28）：',today());
    if(!end)return;
    var moods=S.get('moods',[]).filter(function(r){return r.time.slice(0,10)>=start&&r.time.slice(0,10)<=end});
    var lines=[],map={1:'😢',2:'😕',3:'😐',4:'😀',5:'😊'};
    // Collect dates from all sources
    var allDates={};
    moods.forEach(function(r){var d=r.time.slice(0,10);if(!allDates[d])allDates[d]={moods:[]};allDates[d].moods.push(r)});
    for(var i=0;i<localStorage.length;i++){
      var k=localStorage.key(i);
      if(k.startsWith('mh_grat_20')){
        var d=k.replace('mh_grat_','');
        if(d>=start&&d<=end){
          if(!allDates[d])allDates[d]={moods:[]};
          allDates[d].grat=S.get(k.replace('mh_',''),['','','']);
        }
      }
      if(k.startsWith('mh_write_20')){
        var d=k.replace('mh_write_','');
        if(d>=start&&d<=end){
          if(!allDates[d])allDates[d]={moods:[]};
          allDates[d].diary=S.get(k.replace('mh_',''),'');
        }
      }
    }
    if(!Object.keys(allDates).length){T('所选日期范围无数据');return}
    lines.push('━━━━━━━━━━━━━━━━━━');
    lines.push('  心灵驿站 · 全量记录');
    lines.push('  '+start+' ~ '+end);
    lines.push('━━━━━━━━━━━━━━━━━━');
    lines.push('');
    var dates=Object.keys(allDates).sort();
    dates.forEach(function(d){
      var day=allDates[d];
      lines.push('━━━━━━━━━━━━━━━━━━');
      var label=d;
      if(day.moods.length){
        var last=day.moods[day.moods.length-1];
        label+='  心情：'+(map[last.level]||'');
      }
      lines.push(label);
      lines.push('');
      if(day.diary&&day.diary.trim()){
        lines.push(day.diary.trim());
        lines.push('');
      }
      if(day.grat&&day.grat.some(function(x){return x.trim()})){
        lines.push('🙏 感恩：');
        day.grat.forEach(function(g,i){if(g.trim())lines.push((i+1)+'. '+g.trim())});
        lines.push('');
      }
    });
    lines.push('━━━━━━━━━━━━━━━━━━');
    lines.push('  感谢每一天，感谢你自己');
    lines.push('  心灵驿站 · xinlingyizhan');
    lines.push('━━━━━━━━━━━━━━━━━━');
    var blob=new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'});
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='xinlingyizhan_'+start+'_'+end+'.txt';a.click();
    T('已导出 '+dates.length+' 天记录 ✓');
  }
};

function _initUI(){
  P2.initAppearance();
  F.initPomo();F.renderPomo();F.renderBreath();
  TODAY.init();
  H2.initChat();H2.initExercises();H2.initWritePrompts();H2.initClassroom();

// Init: check auth, sync if logged in
(async function initApp(){
  await refreshAuthUI();
  var uid=await _getUid();
  if(uid){
    syncFromServer(function(status){
      if(status==='empty'){
        var hasLocal=false;
        for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k.indexOf('mh_')===0){hasLocal=true;break}}
        if(hasLocal){pushLocalToServer().then(function(){syncFromServer(function(){_initUI()})});return}
      }
      _initUI();
    });
  }else{
    _initUI();
  }
})();
// Fallback: always init UI within 3 seconds
setTimeout(function(){_initUI()},3000);

// ── Supabase Auth ──
async function signIn(){
  if(!sb){T('云同步不可用（Supabase 未加载），请使用离线模式');return}
  var e=document.getElementById('auth-email').value.trim(),p=document.getElementById('auth-pw').value;
  if(!e||!p){T('请输入邮箱和密码');return}
  var r=await sb.auth.signInWithPassword({email:e,password:p});
  if(r.error){T('登录失败: '+r.error.message)}
  else{refreshAuthUI();syncFromServer(function(status){if(status==='empty'){var hasLocal=false;for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k.indexOf('mh_')===0){hasLocal=true;break}}if(hasLocal){pushLocalToServer().then(function(){syncFromServer(function(){_initUI();T('欢迎回来！数据已同步')})});return}}_initUI();T('欢迎回来！数据已同步')})}
}
async function signUp(){
  if(!sb){T('云同步不可用（Supabase 未加载），请使用离线模式');return}
  var e=document.getElementById('auth-email').value.trim(),p=document.getElementById('auth-pw').value;
  if(!e||!p||p.length<6){T('密码至少6位');return}
  var r=await sb.auth.signUp({email:e,password:p});
  if(r.error){T('注册失败: '+r.error.message)}
  else{T('注册成功！请查看邮箱确认链接，然后回来登录')}
}
async function syncNow(){
  T('正在同步...');
  try{
    await pushLocalToServer();
    await new Promise(function(r){syncFromServer(function(){r()})});
    _initUI();
    T('同步完成！☁');
  }catch(e){T('同步失败: '+e.message);console.log('syncNow err:',e)}
}
async function signOut(){
  if(sb){try{await sb.auth.signOut()}catch(e){}}
  refreshAuthUI();
  localStorage.clear();
  T('已退出登录');
}
async function refreshAuthUI(){
  var s=null;
  if(sb){try{var r=await sb.auth.getSession();s=r.data?.session}catch(e){}}
  if(s&&s.user){
    document.getElementById('auth-logged-out').style.display='none';
    document.getElementById('auth-logged-in').style.display='block';
    document.getElementById('auth-email-display').textContent=s.user.email;
  }else{
    document.getElementById('auth-logged-out').style.display='block';
    document.getElementById('auth-logged-in').style.display='none';
  }
}
